[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache_forge"

# Compiler settings matching Hardhat config
solc_version = "0.8.25"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200

# Remappings for dependencies
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@fhenixprotocol/cofhe-contracts/=lib/fhenix-contracts/contracts/",
    "@fhenixprotocol/cofhe-mock-contracts/=lib/fhenix-contracts/contracts/",
    "@reclaimprotocol/verifier-solidity-sdk/=lib/verifier-solidity-sdk-integration/contracts/",
    "openzeppelin-foundry-upgrades/=lib/openzeppelin-foundry-upgrades/src/",
    "forge-std/=lib/forge-std/src/"
]

# RPC endpoints
[rpc_endpoints]
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

# Etherscan API keys for verification
[etherscan]
arbitrum_sepolia = { key = "${ETHERSCAN_API_KEY}" }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
